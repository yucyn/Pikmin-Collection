<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pikmin Collection</title>
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/collage.css" />

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
</head>

<body>
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-icon">🌱</div>
      <div>
        <h1>Pikmin Collection</h1>
        <p>收藏你的明信片座標｜手機圖片自動壓縮｜座標自動判定國家</p>
      </div>
    </div>

    <div class="upload-tabs">
      <button id="modeFileBtn" class="tab-button active" type="button">選擇圖片</button>
      <button id="modeDragBtn" class="tab-button" type="button">拖曳圖片</button>
      <button id="modePasteBtn" class="tab-button" type="button">貼上圖片</button>
    </div>

    <section id="filePanel" class="upload-panel">
      <button id="selectFileBtn" class="upload-box" type="button">🍃 點擊選擇圖片</button>
      <input id="fileInput" type="file" accept="image/*" hidden />
    </section>

    <section id="dragPanel" class="upload-panel hidden">
      <div id="dropZone" class="upload-box">
        <strong>把圖片拖曳到這裡</strong>
        <small>支援資料夾圖片、網頁圖片</small>
      </div>
    </section>

    <section id="pastePanel" class="upload-panel hidden">
      <div id="pasteZone" class="upload-box" tabindex="0">
        <strong>點擊這裡貼上圖片</strong>
        <small>支援 LINE / 網頁圖片</small>
      </div>
    </section>

    <p id="uploadMessage" class="message"></p>

    <div id="previewBox" class="preview-box hidden">
      <img id="previewImage" alt="preview">
      <button id="clearImageBtn" class="secondary-button" type="button">清除圖片</button>
    </div>

    <input id="locationInput" class="input" placeholder="輸入座標，例如：43.587789, 142.465553" />
    <input id="categoryInput" class="input" placeholder="分類國家會依座標自動判定，也可手動修改" list="categorySuggestions" />

    <datalist id="categorySuggestions">
      <option value="全球"></option>
      <option value="台灣"></option>
      <option value="日本"></option>
      <option value="香港"></option>
      <option value="埃及"></option>
      <option value="希臘"></option>
      <option value="哥倫比亞"></option>
      <option value="紐西蘭"></option>
      <option value="阿根廷"></option>
      <option value="杜拜"></option>
      <option value="布拉格"></option>
      <option value="斯洛維尼亞"></option>
      <option value="英國"></option>
      <option value="義大利"></option>
      <option value="冰島"></option>
      <option value="德國"></option>
      <option value="土耳其"></option>
      <option value="美國"></option>
      <option value="韓國"></option>
    </datalist>

    <button id="addCardBtn" class="primary-button" type="button">新增明信片</button>
  </aside>

  <main class="main">
    <div id="previewModeBanner" class="preview-banner hidden">
      👀 預覽模式：可搜尋、篩選、點愛心、複製座標、查看地圖；不能刪除卡片。
    </div>

    <header class="main-header">
      <div>
        <h2>明信片收藏冊</h2>
        <p>點擊卡片可放大查看；切換地圖模式可查看座標位置。</p>
      </div>

      <div class="toolbar">
        <div class="search-box">
          <input id="searchInput" class="search-input" type="search" placeholder="搜尋座標 / 國家">
          <select id="categoryFilter" class="category-filter">
            <option value="">全球</option>
          </select>
        </div>

        <div class="view-switch">
          <button id="collectionViewBtn" class="view-button active" type="button">收藏冊</button>
          <button id="mapViewBtn" class="view-button" type="button">地圖模式</button>
          <button id="collageViewBtn" class="view-button" type="button">拼貼模式</button>
          <button id="previewModeBtn" class="view-button" type="button">預覽模式</button>
        </div>
      </div>
    </header>

    <section id="collectionView">
      <div id="emptyState" class="empty-state hidden">
        <div>🌼</div>
        <strong>還沒有明信片</strong>
        <p>先上傳圖片並輸入座標，就能建立第一張收藏卡。</p>
      </div>
      <div id="grid" class="grid"></div>
    </section>

    <section id="mapView" class="map-view hidden">
      <div id="mapList" class="map-list"></div>
      <div class="map-frame-wrap">
        <iframe id="mapFrame" class="map-frame" loading="lazy"></iframe>
        <div id="mapEmpty" class="map-empty">選擇一張明信片查看地圖</div>
      </div>
    </section>

    <section id="collageView" class="collage-view hidden">
      <div class="collage-layout">
        <aside class="collage-library">
          <div class="collage-section-title">
            <h3>明信片圖片庫</h3>
            <p>點擊「＋」加入拼貼畫布</p>
          </div>
          <div id="collageLibraryGrid" class="collage-library-grid"></div>
        </aside>

        <section class="collage-workspace">
          <div class="collage-toolbar">
            <div>
              <h3>拼貼畫布</h3>
              <p>拖曳移動圖片，使用下方工具調整。</p>
            </div>
            <div class="collage-toolbar-actions">
              <button id="collageBringFrontBtn" class="collage-tool-button" type="button">移到最上層</button>
              <button id="collageRemoveBtn" class="collage-tool-button danger" type="button">刪除選取</button>
              <button id="collageClearBtn" class="collage-tool-button" type="button">清空畫布</button>
              <button id="collageExportBtn" class="collage-tool-button primary" type="button">匯出 PNG</button>
            </div>
          </div>

          <div id="collageCanvas" class="collage-canvas" aria-label="拼貼畫布">
            <div class="collage-empty-hint">從左側加入明信片開始拼貼</div>
          </div>

          <div class="collage-controls">
            <label>
              縮放
              <input id="collageScaleRange" type="range" min="40" max="180" value="100">
            </label>
            <label>
              旋轉
              <input id="collageRotateRange" type="range" min="-45" max="45" value="0">
            </label>
          </div>
        </section>
      </div>
    </section>

  </main>

  <div id="cardModal" class="modal hidden">
    <div id="cardModalBackdrop" class="modal-backdrop"></div>
    <article class="modal-panel">
      <button id="closeCardModalBtn" class="modal-close" type="button">✕</button>
      <img id="modalCardImage" alt="postcard">
      <div class="modal-content">
        <h3 id="modalCardTitle"></h3>
        <p id="modalCardLocation"></p>
        <a id="modalMapLink" class="map-btn" target="_blank" rel="noopener noreferrer">Open Google Map</a>
        <button id="modalShareCardBtn" class="share-button" type="button">分享這張明信片</button>
      </div>
    </article>
  </div>

  <script src="./js/firebaseConfig.js"></script>
  <script src="./js/storage.js"></script>
  <script src="./js/locationParser.js"></script>
  <script src="./js/imageUpload.js"></script>
  <script src="./js/render.js"></script>
  <script src="./js/collage.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
