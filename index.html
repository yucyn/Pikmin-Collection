<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pikmin Collection</title>
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/v28-theme.css" />
  <link rel="stylesheet" href="./css/v28-gallery.css" />
  <link rel="stylesheet" href="./css/v28-modal.css" />
  <link rel="stylesheet" href="./css/v30-final.css">
  <link rel="stylesheet" href="./css/tag-system.css">
  <link rel="stylesheet" href="./css/toolbar.css">
  <link rel="stylesheet" href="./css/pikmin-top-v8.css">
  <link rel="stylesheet" href="./css/v31-stable.css">
  <link rel="stylesheet" href="./css/pagination.css">
  <link rel="stylesheet" href="./css/v33-sidebar.css">
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-analytics-compat.js"></script>
  <link rel="icon" href="./favicon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/v37-mushroom-auth-lock.css">
  <link rel="stylesheet" href="./css/v37-mushroom-realtime.css?v=21">
</head>

<body>
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <button id="toggleSidebarBtn" class="toggle-btn">☰</button>
    </div>

    <div class="sidebar-card-count-row" title="收藏冊中的明信片總數">
      <span class="sidebar-card-count-line">
        <span class="sidebar-card-count-label">明信片</span>
        <span id="sidebarCardCount" class="sidebar-card-count-value">—</span>
        <span class="sidebar-card-count-unit">張</span>
      </span>
    </div>

    <!-- ✅ 新增明信片按鈕：移到公告欄上方 -->
    <!-- V33：專屬彈出視窗觸發鈕 -->
    <div class="sidebar-upload-trigger">
      <button id="openUploadBtn" class="primary-button" title="新增明信片" onclick="openUploadModal()">
        <span class="plus-icon">＋</span>
        <span class="btn-text">新增明信片</span>
      </button>
    </div>

    <!-- 公告區 & 訪客統計 -->
    <div class="sidebar-notice">
      <div class="notice-title">
        <span>📢 公告欄</span>
        <button id="editBulletinBtn" class="admin-only-btn" style="display:none; border:0; background:transparent; cursor:pointer; font-size:12px; opacity:0.5;">✏️</button>
        <span id="visitorStats" style="display:none; margin-left:10px; font-size:11px; font-weight:normal; color:var(--muted); gap:6px; align-items:center;">
          <span>👁️ <span id="viewCount">...</span></span>
          <span title="在線人數" style="margin-left:2px;">🟢 <span id="onlineCount">...</span></span>
        </span>
      </div>
      <div id="bulletinContainer" class="notice-content" style="min-height: 350px; max-height: 350px; height: auto; overflow-y: auto; position: relative;">
        <div id="bulletinContent" style="transition: opacity 0.5s ease; word-break: break-word; line-height: 1.45;">載入中...</div>
      </div>
      <div id="bulletinEditArea" style="display:none; margin-top:8px;">
        <textarea id="bulletinInput" style="width:100%; border-radius:8px; border:1px solid #ddd; padding:8px; font-size:13px; min-height:80px;"></textarea>
        <button id="saveBulletinBtn" class="primary-button" style="margin-top:8px; padding:6px; font-size:13px;">儲存公告</button>
      </div>
    </div>

    <!-- ✅ V37：登入按鈕新位置（側邊欄底部） -->
    <div id="v37SidebarAuthRow" class="sidebar-auth-section"></div>

  </aside>

  <header class="main-header">
    <div class="brand">
      <div class="brand-icon">🌱</div>
      <div class="brand-text">
        <h1 id="siteTitle">Pikmin Collection</h1>
        <p id="siteSubtitle">收藏你的明信片座標</p>
      </div>
    </div>
  </header>

  <main class="main v28-scope">
    <div id="previewModeBanner" class="preview-banner hidden">
      👀 預覽模式：可搜尋、篩選、點愛心、複製座標、查看地圖；不能刪除卡片。
    </div>

    <div class="toolbar pikmin-toolbar">
      <div class="pikmin-search search-box">
        <input id="searchInput" class="pikmin-search-input search-input" type="search" placeholder="搜尋座標 / 國家">
        <span class="pikmin-leaf"></span>
        <select id="categoryFilter" class="category-filter" style="display:none;">
          <option value="">全球</option>
        </select>
      </div>
    </div>

    <div id="mushroomInfoBar"></div>

    <div class="toolbar pikmin-toolbar">
      <div class="pikmin-toolbar-actions">
        <button id="collectionViewBtn" class="pikmin-pill view-button is-active active">收藏冊</button>
        <button id="mapViewBtn" class="pikmin-pill view-button">地圖</button>
        <button id="browseModeBtn" class="pikmin-pill pikmin-preview-btn">瀏覽</button>
        <div class="tag-filter-wrapper">
          <button id="mobileTagFilterBtn" class="mobile-filter-icon-only">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="4" y1="6" x2="20" y2="6"></line>
              <line x1="7" y1="12" x2="17" y2="12"></line>
              <line x1="10" y1="18" x2="14" y2="18"></line>
            </svg>
          </button>
        </div>
      </div>

      <div id="mobileTagMenu" class="mobile-tag-menu hidden">
        <button class="mobile-tag-item active" data-tag="">全部</button>
        <button class="mobile-tag-item" data-tag="活動">活動</button>
        <button class="mobile-tag-item" data-tag="花">花</button>
        <button class="mobile-tag-item" data-tag="蘑菇">蘑菇</button>
        <button class="mobile-tag-item" data-tag="隱藏">隱藏</button>
        <button class="mobile-tag-item" data-tag="絕版">絕版</button>
      </div>
    </div>

    <section id="collectionView">
      <div id="mobileBulletinSection" class="mobile-bulletin-section">
        <div class="mobile-bulletin-card">
          <div class="notice-title">
            <span>📢 公告欄</span>
          </div>
          <div id="mobileBulletinContent" class="mobile-bulletin-content">載入中...</div>
        </div>
      </div>

      <div id="emptyState" class="empty-state hidden">
        <div>🌼</div>
        <strong>還沒有明信片</strong>
        <p>先上傳圖片並輸入座標，就能建立第一張收藏卡。</p>
      </div>
      <div id="grid" class="grid"></div>
      <div id="pagination" class="pagination"></div>
    </section>

    <section id="mapView" class="map-view hidden">
      <div id="mapList" class="map-list"></div>
      <div class="map-frame-wrap">
        <iframe id="mapFrame" class="map-frame" loading="lazy"></iframe>
        <div id="mapEmpty" class="map-empty">選擇一張明信片查看地圖</div>
      </div>
    </section>
  </main>

  <!-- 留言板搬家到這裡 -->
  <div id="sidebarGuestbookContainer" class="sidebar-guestbook main-footer-guestbook">
    <div class="notice-title">
      <span>💬 留言板</span>
    </div>
    <div id="guestbookList" class="guestbook-list-wide"></div>
    <div class="guestbook-input-wide">
      <input type="text" id="guestNameInput" placeholder="暱稱">
      <input type="text" id="guestMsgInput" placeholder="想說什麼...">
      <button id="sendMsgBtn">傳送</button>
    </div>
  </div>

  <div id="uploadModal" class="modal hidden">
    <div id="uploadModalBackdrop" class="modal-backdrop"></div>
    <div class="modal-panel upload-modal-panel">
      <button id="closeUploadModalBtn" class="modal-close" type="button">✕</button>
      <div class="modal-header"><h3>✨ 新增明信片</h3></div>
      <div class="modal-content">
        <div class="upload-tabs upload-tabs--hidden" aria-hidden="true">
          <button id="modeFileBtn" class="tab-button active">選擇圖片</button>
          <button id="modeDragBtn" class="tab-button">拖曳圖片</button>
          <button id="modePasteBtn" class="tab-button">貼上圖片</button>
        </div>
        <section id="filePanel" class="upload-panel upload-simple">
          <div id="dropZone" class="upload-drop" tabindex="0">
            <div class="upload-illustration">
              <svg class="upload-svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
            </div>
            <div class="upload-main-text">將圖片拖曳到這裡，或 <button id="selectFileBtn" class="upload-text-button">上傳檔案</button></div>
            <input id="fileInput" type="file" accept="image/*" hidden />
            <div id="pasteZone" class="paste-catcher" tabindex="0"></div>
            <div id="previewBox" class="preview-box upload-inline-preview hidden"><img id="previewImage" alt="preview"><button id="clearImageBtn" class="secondary-button">清除圖片</button></div>
          </div>
        </section>
        <p id="uploadMessage" class="message"></p>

        <div class="sidebar-form-grid">
          <div class="field-full"><label class="sidebar-label">GPS座標</label><input id="locationInput" class="input" placeholder="25.0330, 121.5654" /></div>
          <div class="field-half"><label class="sidebar-label">國家</label><input id="categoryInput" class="input" placeholder="國家" list="categorySuggestions" /></div>
          <div class="field-half"><label class="sidebar-label">標籤</label><select id="tagInput" class="input" required><option value="" disabled selected hidden>樣式</option><option value="活動">活動</option><option value="花">花</option><option value="蘑菇">蘑菇</option><option value="隱藏">隱藏</option><option value="絕版">絕版</option></select></div>
          <div class="field-half"><label class="sidebar-label">上傳者</label><input id="authorInput" class="input" placeholder="暱稱" /></div>
          <div class="field-half"><label class="sidebar-label">建立標籤</label><input id="noteInput" class="input" placeholder="備註" list="noteSuggestions" /></div>
          <div class="field-half"><label class="sidebar-label">網站連結</label><input id="websiteInput" class="input" placeholder="https://" /></div>
          <div class="field-half"><label class="sidebar-label">來源</label><input id="sourceInput" class="input" placeholder="來源" /></div>
        </div>
        <button id="addCardBtn" class="primary-button">上傳明信片</button>
      </div>
    </div>
  </div>

  <button id="v28CreateFab" class="v28-create-fab">＋</button>
  <button id="mobileUploadFab" class="mobile-upload-fab">＋</button>
  <button id="mobileScrollTopFab" class="mobile-scroll-top-fab">↑</button>

  <div id="v28CreateMenu" class="v28-create-menu hidden" style="display:none;">
    <button class="v28-create-item" data-v28-action="upload"><span>📷</span><div><strong>上傳明信片</strong></div></button>
    <button class="v28-create-item" data-v28-action="coords"><span>📍</span><div><strong>輸入座標</strong></div></button>
  </div>

  <div id="cardModal" class="modal hidden">
    <div id="cardModalBackdrop" class="modal-backdrop"></div>
    <article class="modal-panel">
      <button id="closeCardModalBtn" class="modal-close">✕</button>
      <button id="modalPrevBtn" class="modal-nav-btn modal-prev-btn">❮</button>
      <button id="modalNextBtn" class="modal-nav-btn modal-next-btn">❯</button>
      <div class="modal-image-wrap"><img id="modalCardImage"></div>
      <div class="modal-content">
        <h3 id="modalCardTitle"></h3><p id="modalCardLocation"></p>
        <div class="modal-info-list">
          <div id="modalCardAuthorRow" class="info-item"><span>上傳者：</span><span id="modalCardAuthor"></span></div>
          <div id="modalCardSourceRow" class="info-item"><span>來源：</span><span id="modalCardSource"></span></div>
          <div id="modalCardWebsiteRow" class="info-item"><span>網站：</span><div id="modalCardWebsite"></div></div>
          <button id="modalShareCardBtn" class="modal-share-icon">🔗</button>
        </div>
        <a id="modalMapLink" class="btn-primary" target="_blank">Open Map</a>
      </div>
    </article>
  </div>

  <datalist id="categorySuggestions">
    <option value="全球"></option><option value="台灣"></option><option value="日本"></option><option value="韓國"></option><option value="香港"></option><option value="澳門"></option><option value="泰國"></option><option value="新加坡"></option><option value="馬來西亞"></option><option value="越南"></option><option value="菲律賓"></option><option value="印度"></option><option value="印尼"></option><option value="美國"></option><option value="加拿大"></option><option value="澳洲"></option><option value="紐西蘭"></option><option value="英國"></option><option value="法國"></option><option value="德國"></option><option value="義大利"></option><option value="西班牙"></option><option value="葡萄牙"></option><option value="瑞士"></option><option value="荷蘭"></option><option value="奧地利"></option><option value="希臘"></option><option value="挪威"></option><option value="芬蘭"></option><option value="冰島"></option><option value="土耳其"></option><option value="埃及"></option><option value="墨西哥"></option><option value="巴西"></option><option value="哥倫比亞"></option><option value="阿根廷"></option><option value="智利"></option><option value="馬紹爾群島"></option><option value="杜拜"></option><option value="布拉格"></option><option value="斯洛維尼亞"></option>
  </datalist>
  <datalist id="noteSuggestions"></datalist>

  <script>
    // V33：側邊欄切換邏輯
    const sidebar = document.getElementById('sidebar');
    const toggleBtn = document.getElementById('toggleSidebarBtn');
    
    // 預設設為收合
    sidebar.classList.add('collapsed');

    toggleBtn.addEventListener('click', () => {
      sidebar.classList.toggle('collapsed');
    });
  </script>
  <script src="./js/firebaseConfig.js"></script>
  <script src="./js/storage.js"></script>
  <script src="./js/locationParser.js"></script>
  <script src="./js/imageUpload.js"></script>
  <script src="./js/v37-mushroom-auth-lock.js"></script>
  <script src="./js/v37-mushroom-realtime.js?v=2"></script>
  <script src="./js/render.js"></script>
  <script src="./js/v28/v28-plus-menu.js"></script>
  <script src="./js/v28/v28-ui-bridge.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
