<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="stylesheet" href="./css/v30-final.css" />

<title>Pikmin UI</title>
</head>

<body>

<div class="main">

  <!-- ⭐ 完整 test version-8 -->
  <div class="control-panel">

    <div class="top-bar">

      <!-- 搜尋 -->
      <div class="search-box">
        <input class="search-input" placeholder="搜尋座標 / 國家">
        <div class="search-leaf"></div>
      </div>

      <!-- 按鈕 -->
      <div class="filter-row">

        <button class="pill-btn active">收藏冊</button>
        <button class="pill-btn">地圖</button>
        <button class="pill-btn">拼貼</button>

        <button class="pill-btn active">全部</button>
        <button class="pill-btn">花</button>
        <button class="pill-btn">蘑菇</button>
        <button class="pill-btn">隱藏</button>

        <button class="pill-btn preview-btn">預覽模式</button>

      </div>

    </div>

  </div>

</div>

</body>
</html>
