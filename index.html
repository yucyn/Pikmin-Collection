<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pikmin Collection</title>
  <link rel="stylesheet" href="./css/style.css" />

  <!-- V28 Integrated UI Layer -->
  <link rel="stylesheet" href="./css/v28-theme.css" />
  <link rel="stylesheet" href="./css/v28-gallery.css" />
  <link rel="stylesheet" href="./css/v28-modal.css" />

  <link rel="stylesheet" href="./css/v30-final.css">
  
  <link rel="stylesheet" href="./css/tag-system.css">

  <link rel="stylesheet" href="./css/toolbar.css">
  

  
  <link rel="stylesheet" href="./css/pikmin-top-v8.css">
  <link rel="stylesheet" href="./css/v31-stable.css">
  <link rel="stylesheet" href="./css/pagination.css">
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

  <link rel="icon" href="./favicon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
</head>



<body>
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-icon">🌱</div>
      <div>
        <h1 id="siteTitle">Pikmin Collection</h1>
        <p id="siteSubtitle">收藏你的明信片座標</p>
      </div>
    </div>

    <!-- 公告區 & 訪客統計 -->
    <div class="sidebar-notice">
      <div class="notice-title">
        <span>📢 公告欄</span>
        <button id="editBulletinBtn" class="admin-only-btn" style="display:none; border:0; background:transparent; cursor:pointer; font-size:12px; opacity:0.5;">✏️</button>
        <!-- 訪客統計 (管理員可見) -->
        <span id="visitorStats" style="display:none; margin-left:auto; font-size:11px; font-weight:normal; color:var(--muted);">👁️ <span id="viewCount">...</span></span>
      </div>
      <div id="bulletinContainer" class="notice-content" style="height: 1.5em; overflow: hidden; position: relative;">
        <div id="bulletinContent" style="transition: opacity 0.5s ease;">載入中...</div>
      </div>
      
      <!-- 編輯區塊 -->
      <div id="bulletinEditArea" style="display:none; margin-top:8px;">
        <p style="font-size:11px; color:var(--muted); margin-bottom:4px;">每一行代表一則輪播訊息</p>
        <textarea id="bulletinInput" style="width:100%; border-radius:8px; border:1px solid #ddd; padding:8px; font-size:13px; min-height:80px;"></textarea>
        <button id="saveBulletinBtn" class="primary-button" style="margin-top:8px; padding:6px; font-size:13px;">儲存公告</button>
      </div>
    </div>


    <!-- V31.7：保留模式按鈕給舊 JS 使用，但畫面隱藏，改成單一簡潔上傳欄 -->
    <div class="upload-tabs upload-tabs--hidden" aria-hidden="true">
      <button id="modeFileBtn" class="tab-button active" type="button">選擇圖片</button>
      <button id="modeDragBtn" class="tab-button" type="button">拖曳圖片</button>
      <button id="modePasteBtn" class="tab-button" type="button">貼上圖片</button>
    </div>

    <section id="filePanel" class="upload-panel upload-simple">
      <div id="dropZone" class="upload-drop" tabindex="0">
        <div class="upload-illustration" aria-hidden="true">
          <svg class="upload-svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <circle cx="8.5" cy="8.5" r="1.5"></circle>
            <polyline points="21 15 16 10 5 21"></polyline>
          </svg>
        </div>
        <div class="upload-main-text">
          將圖片拖曳到這裡，或
          <button id="selectFileBtn" class="upload-text-button" type="button">上傳檔案</button>
        </div>
        <div class="upload-hint">支援 JPG / PNG / WebP，也可以直接 Ctrl+V 貼上圖片</div>
        <input id="fileInput" type="file" accept="image/*" hidden />
        <div id="pasteZone" class="paste-catcher" tabindex="0" aria-label="貼上圖片區"></div>

        <!-- V32.1：圖片預覽直接顯示在上傳欄內 -->
        <div id="previewBox" class="preview-box upload-inline-preview hidden">
          <img id="previewImage" alt="preview">
          <button id="clearImageBtn" class="secondary-button" type="button">清除圖片</button>
        </div>
      </div>
    </section>

    <section id="dragPanel" class="upload-panel hidden"></section>
    <section id="pastePanel" class="upload-panel hidden"></section>

    <p id="uploadMessage" class="message"></p>

    <div class="sidebar-form-grid">
      <div class="field-full">
        <label class="sidebar-label" for="locationInput">GPS座標</label>
        <input id="locationInput" class="input" placeholder="25.0330, 121.5654" />
      </div>

      <div class="field-half">
        <label class="sidebar-label" for="categoryInput">國家</label>
        <input id="categoryInput" class="input" placeholder="國家" list="categorySuggestions" />
      </div>

      <div class="field-half">
        <label class="sidebar-label" for="tagInput">標籤</label>
        <select id="tagInput" class="input" required>
          <option value="" disabled selected hidden>菇/花/隱藏/活動/絕版</option>
          <option value="活動">活動</option>
          <option value="花">花</option>
          <option value="蘑菇">蘑菇</option>
          <option value="隱藏">隱藏</option>
          <option value="絕版">絕版</option>
        </select>
      </div>

      <div class="field-half">
        <label class="sidebar-label" for="authorInput">上傳者</label>
        <input id="authorInput" class="input" placeholder="名字/暱稱" />
      </div>

      <div class="field-half">
        <label class="sidebar-label" for="noteInput">建立標籤</label>
        <input id="noteInput" class="input" placeholder="自定義標籤/備註" list="noteSuggestions" />
      </div>

      <div class="field-half">
        <label class="sidebar-label" for="websiteInput">網站連結</label>
        <input id="websiteInput" class="input" placeholder="https://..." />
      </div>

      <div class="field-half">
        <label class="sidebar-label" for="sourceInput">來源</label>
        <input id="sourceInput" class="input" placeholder="X/Twitter..." />
      </div>
    </div>

    <datalist id="categorySuggestions">
      <option value="全球"></option>
      <option value="台灣"></option>
      <option value="日本"></option>
      <option value="韓國"></option>
      <option value="香港"></option>
      <option value="澳門"></option>
      <option value="泰國"></option>
      <option value="新加坡"></option>
      <option value="馬來西亞"></option>
      <option value="越南"></option>
      <option value="菲律賓"></option>
      <option value="印度"></option>
      <option value="印尼"></option>
      <option value="美國"></option>
      <option value="加拿大"></option>
      <option value="澳洲"></option>
      <option value="紐西蘭"></option>
      <option value="英國"></option>
      <option value="法國"></option>
      <option value="德國"></option>
      <option value="義大利"></option>
      <option value="西班牙"></option>
      <option value="葡萄牙"></option>
      <option value="瑞士"></option>
      <option value="荷蘭"></option>
      <option value="奧地利"></option>
      <option value="希臘"></option>
      <option value="挪威"></option>
      <option value="芬蘭"></option>
      <option value="冰島"></option>
      <option value="土耳其"></option>
      <option value="埃及"></option>
      <option value="墨西哥"></option>
      <option value="巴西"></option>
      <option value="哥倫比亞"></option>
      <option value="阿根廷"></option>
      <option value="智利"></option>
      <option value="馬紹爾群島"></option>
      <option value="杜拜"></option>
      <option value="布拉格"></option>
      <option value="斯洛維尼亞"></option>
    </datalist>

    <button id="addCardBtn" class="primary-button" type="button">上傳明信片</button>

    <div class="sidebar-actions" style="margin-top:15px;">
      <!-- V33：留言板搬移至此 -->
      <div class="sidebar-guestbook" style="padding-top:15px; border-top:1px solid #eee;">
        <div class="notice-title" style="margin-bottom:10px; border-bottom:1px solid #eee; padding-bottom:5px;">
          <span>💬 留言板</span>
        </div>
        <div id="guestbookList" style="max-height:250px; overflow-y:auto; margin-bottom:10px; font-size:12px;">
          <!-- 留言內容將由 JS 動態載入 -->
        </div>
        <div class="guestbook-input" style="display:flex; gap:8px;">
          <input type="text" id="guestNameInput" placeholder="暱稱" style="width:85px; font-size:13px; border-radius:12px; border:1px solid #ddd; padding:5px 10px;">
          <input type="text" id="guestMsgInput" placeholder="想說什麼..." style="flex:1; font-size:13px; border-radius:12px; border:1px solid #ddd; padding:5px 10px;">
          <button id="sendMsgBtn" style="border:0; background:var(--green); color:#fff; border-radius:15px; padding:2px 12px; font-size:13px; cursor:pointer; white-space:nowrap;">傳送</button>
        </div>
      </div>
    </div>
  </aside>

  
  <main class="main v28-scope">
    <div id="previewModeBanner" class="preview-banner hidden">
      👀 預覽模式：可搜尋、篩選、點愛心、複製座標、查看地圖；不能刪除卡片。
    </div>



      <div class="toolbar pikmin-toolbar">

  <!-- 搜尋 -->
  <div class="pikmin-search search-box">
    <input id="searchInput"
           class="pikmin-search-input search-input"
           type="search"
           placeholder="搜尋座標 / 國家">

    <span class="pikmin-leaf"></span>

    <!-- 保留原本 select（但隱藏） -->
    <select id="categoryFilter" class="category-filter" style="display:none;">
      <option value="">全球</option>
    </select>
  </div>

  <!-- 功能按鈕 -->
  <div class="pikmin-toolbar-actions">

    <!-- 模式 -->
    <button id="collectionViewBtn"
            class="pikmin-pill view-button is-active active">
      收藏冊
    </button>

    <button id="mapViewBtn"
            class="pikmin-pill view-button">
      地圖
    </button>

    <button id="browseModeBtn"
            class="pikmin-pill pikmin-preview-btn">
      瀏覽
    </button>
    <!-- 分類（沿用原 class） -->
    <!-- 統一標籤篩選圖示 (桌機/手機共用) -->
    <div class="tag-filter-wrapper">
      <button id="mobileTagFilterBtn" class="mobile-filter-icon-only">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="4" y1="6" x2="20" y2="6"></line>
          <line x1="7" y1="12" x2="17" y2="12"></line>
          <line x1="10" y1="18" x2="14" y2="18"></line>
        </svg>
      </button>
    </div>
  </div>

  <!-- 標籤選單 -->
  <div id="mobileTagMenu" class="mobile-tag-menu hidden">
    <button class="mobile-tag-item active" data-tag="">全部</button>
    <button class="mobile-tag-item" data-tag="活動">活動</button>
    <button class="mobile-tag-item" data-tag="花">花</button>
    <button class="mobile-tag-item" data-tag="蘑菇">蘑菇</button>
    <button class="mobile-tag-item" data-tag="隱藏">隱藏</button>
    <button class="mobile-tag-item" data-tag="絕版">絕版</button>
  </div>


  </div>

</div>

    <section id="collectionView">
      <div id="emptyState" class="empty-state hidden">
        <div>🌼</div>
        <strong>還沒有明信片</strong>
        <p>先上傳圖片並輸入座標，就能建立第一張收藏卡。</p>
      </div>
      <div id="grid" class="grid"></div>
      <div id="pagination" class="pagination"></div>
    </section>

    <section id="mapView" class="map-view hidden">
      <div id="mapList" class="map-list"></div>
      <div class="map-frame-wrap">
        <iframe id="mapFrame" class="map-frame" loading="lazy"></iframe>
        <div id="mapEmpty" class="map-empty">選擇一張明信片查看地圖</div>
      </div>
    </section>


  </main>

  <!-- V28 Floating Create Menu -->
  <button id="v28CreateFab" class="v28-create-fab" type="button" aria-label="建立">＋</button>
  <button id="mobileUploadFab" class="mobile-upload-fab" type="button" aria-label="上傳明信片">＋</button>
  <button id="mobileScrollTopFab" class="mobile-scroll-top-fab" type="button" aria-label="回到頂部">↑</button>

  <div id="v28CreateMenu" class="v28-create-menu" aria-hidden="true" style="display:none;">
    <button class="v28-create-item" type="button" data-v28-action="upload">
      <span>📷</span>
      <div>
        <strong>上傳明信片</strong>
        <small>沿用左側圖片上傳流程</small>
      </div>
    </button>

    <button class="v28-create-item" type="button" data-v28-action="coords">
      <span>📍</span>
      <div>
        <strong>輸入座標</strong>
        <small>快速建立座標卡片</small>
      </div>
    </button>
  </div>

  <section id="v28CoordDialog" class="v28-coord-dialog" aria-hidden="true">
    <div class="v28-coord-card">
      <button id="v28CoordClose" class="v28-coord-close" type="button">×</button>
      <h3>📍 新增座標</h3>
      <p>會自動填入原本左側表單，仍沿用你的新增明信片流程。</p>

      <label>GPS座標</label>
      <input id="v28CoordValue" placeholder="25.0330, 121.5654">
      <label>國家</label>
      <input id="v28CoordCountry" placeholder="國家">

      <button id="v28CoordApply" class="v28-coord-submit" type="button">填入原表單</button>
    </div>
  </section>

  <div id="cardModal" class="modal hidden">
    <div id="cardModalBackdrop" class="modal-backdrop"></div>

    <article class="modal-panel">
      <button id="closeCardModalBtn" class="modal-close" type="button">✕</button>

      <!-- 卡片內左右切換箭頭 -->
      <button id="modalPrevBtn" class="modal-nav-btn modal-prev-btn" type="button" aria-label="上一張">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <button id="modalNextBtn" class="modal-nav-btn modal-next-btn" type="button" aria-label="下一張">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>

      <!-- 圖片疊層 -->
      <div class="modal-image-wrap">
        <img id="modalCardImage" alt="postcard">
      </div>

      <div class="modal-content">
        <h3 id="modalCardTitle"></h3>
        <p id="modalCardLocation"></p>
        
        <!-- 新增欄位顯示 -->
        <div class="modal-info-list">
          <div id="modalCardAuthorRow" class="info-item">
            <span class="info-label">上&ensp;傳&ensp;者：</span>
            <span id="modalCardAuthor" class="info-value"></span>
          </div>
          <div id="modalCardSourceRow" class="info-item">
            <span class="info-label">資料來源：</span>
            <span id="modalCardSource" class="info-value"></span>
          </div>
          <div id="modalCardWebsiteRow" class="info-item">
            <span class="info-label">網&emsp;&emsp;站：</span>
            <div id="modalCardWebsite" class="info-value"></div>
          </div>

          <!-- 分享按鈕 (右下角紅框位置) -->
          <button id="modalShareCardBtn" class="modal-share-icon" type="button" title="分享這張明信片" aria-label="分享這張明信片">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
              <polyline points="15 3 21 3 21 9"/>
              <line x1="10" y1="14" x2="21" y2="3"/>
            </svg>
          </button>
        </div>

        <a id="modalMapLink" class="btn-primary" target="_blank">
          <span class="map-link-text">Open Google Map</span>
          <span class="map-link-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          </span>
        </a>
      </div>
    </article>
  </div>

  <script src="./js/firebaseConfig.js"></script>
  <script src="./js/storage.js"></script>
  <script src="./js/locationParser.js"></script>
  <script src="./js/imageUpload.js"></script>
  <script src="./js/render.js"></script>

  <!-- V28 Integrated UI Layer -->
  <script src="./js/v28/v28-plus-menu.js"></script>
  <script src="./js/v28/v28-ui-bridge.js"></script>

  <script src="./js/app.js"></script>
</body>
</html>
